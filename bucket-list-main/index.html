<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 버킷 리스트</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-bg min-h-screen py-10">
    <div class="container mx-auto px-4 max-w-4xl">
        <!-- 헤더 -->
        <header class="text-center mb-10">
            <h1 class="text-5xl font-extrabold mb-3 tracking-tight">
                <span class="header-gradient-text">🎯 나의 버킷 리스트</span>
            </h1>
            <p class="text-white/80 text-lg">인생에서 꼭 이루고 싶은 것들을 기록하세요</p>
        </header>

        <!-- 통계 -->
        <div class="glass-card rounded-2xl p-6 mb-6">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">
                <div class="stat-cell">
                    <p class="text-3xl font-bold text-blue-600" id="totalCount">0</p>
                    <p class="text-gray-500 text-sm mt-1">전체</p>
                </div>
                <div class="stat-cell">
                    <p class="text-3xl font-bold text-green-600" id="completedCount">0</p>
                    <p class="text-gray-500 text-sm mt-1">완료</p>
                </div>
                <div class="stat-cell">
                    <p class="text-3xl font-bold text-orange-500" id="progressCount">0</p>
                    <p class="text-gray-500 text-sm mt-1">진행중</p>
                </div>
                <div class="stat-cell">
                    <p class="text-3xl font-bold text-purple-600" id="completionRate">0%</p>
                    <p class="text-gray-500 text-sm mt-1">달성률</p>
                </div>
            </div>
        </div>

        <!-- 입력 폼 -->
        <div class="glass-card rounded-2xl p-6 mb-6">
            <form id="bucketForm" class="flex gap-3">
                <input
                    type="text"
                    id="bucketInput"
                    placeholder="새로운 버킷 리스트를 입력하세요..."
                    class="flex-1 px-5 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                    required
                >
                <button
                    type="submit"
                    class="btn-primary px-7 py-3 text-white rounded-xl font-semibold"
                >
                    추가
                </button>
            </form>
        </div>

        <!-- 필터 -->
        <div class="glass-card rounded-2xl p-4 mb-6">
            <div class="flex gap-2 justify-center">
                <button
                    class="filter-btn px-6 py-2 rounded-xl font-medium transition active"
                    data-filter="all"
                >
                    전체
                </button>
                <button
                    class="filter-btn px-6 py-2 rounded-xl font-medium transition"
                    data-filter="active"
                >
                    진행중
                </button>
                <button
                    class="filter-btn px-6 py-2 rounded-xl font-medium transition"
                    data-filter="completed"
                >
                    완료
                </button>
            </div>
        </div>

        <!-- 버킷 리스트 목록 -->
        <div id="bucketListContainer" class="space-y-3">
            <!-- 동적으로 생성됨 -->
        </div>

        <!-- 빈 상태 메시지 -->
        <div id="emptyState" class="glass-card rounded-2xl text-center py-16 hidden">
            <p class="text-5xl mb-4">✨</p>
            <p class="text-gray-700 text-lg font-medium">아직 버킷 리스트가 없습니다.</p>
            <p class="text-gray-500">위에서 새로운 목표를 추가해보세요!</p>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-gray-800">버킷 리스트 수정</h3>
            <form id="editForm">
                <input
                    type="text"
                    id="editInput"
                    class="w-full px-5 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent mb-4 transition"
                    required
                >
                <div class="flex gap-2 justify-end">
                    <button
                        type="button"
                        id="cancelEdit"
                        class="px-5 py-2 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-colors font-medium"
                    >
                        취소
                    </button>
                    <button
                        type="submit"
                        class="btn-primary px-5 py-2 text-white rounded-xl font-semibold"
                    >
                        저장
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
